<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUE Admin | Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl border border-zinc-100">
        <h2 class="text-4xl font-black mb-10 text-zinc-900 tracking-tighter">Post New Watch</h2>
        
        <div class="space-y-5">
            <div>
                <label class="text-xs font-bold text-zinc-400 uppercase ml-2">Model Name</label>
                <input id="name" type="text" placeholder="e.g. Rolex Submariner" class="w-full bg-zinc-100 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500">
            </div>
            <div>
                <label class="text-xs font-bold text-zinc-400 uppercase ml-2">Price (PKR)</label>
                <input id="price" type="number" placeholder="55000" class="w-full bg-zinc-100 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500">
            </div>
            <div>
                <label class="text-xs font-bold text-zinc-400 uppercase ml-2">Image Direct Link</label>
                <input id="url" type="text" placeholder="https://i.postimg.cc/..." class="w-full bg-zinc-100 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500">
            </div>
            
            <button onclick="uploadWatch()" id="btn" class="w-full bg-black text-white p-5 rounded-2xl font-black text-xl mt-4 hover:scale-[1.02] transition-transform">
                POST TO STORE
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "watchstore-f0d57.firebaseapp.com",
            projectId: "watchstore-f0d57",
            storageBucket: "watchstore-f0d57.appspot.com",
            messagingSenderId: "3491239",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadWatch = async () => {
            const btn = document.getElementById('btn');
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const url = document.getElementById('url').value;

            if(!name || !price || !url) return alert("Bhai, saari details bharein!");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "watches"), {
                    name, price, url,
                    createdAt: Date.now()
                });
                alert("Mubarak ho! Watch add ho gayi.");
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "POST TO STORE";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
