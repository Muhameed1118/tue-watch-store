<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Add Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Add New Watch</h2>
        
        <label class="block text-sm font-medium text-gray-700 mb-1">Watch Name</label>
        <input id="name" type="text" placeholder="e.g. Rolex Submariner" class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
        
        <label class="block text-sm font-medium text-gray-700 mb-1">Price (PKR)</label>
        <input id="price" type="number" placeholder="e.g. 25000" class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
        
        <label class="block text-sm font-medium text-gray-700 mb-1">Image Direct Link</label>
        <input id="url" type="text" placeholder="Paste link from postimages.org" class="w-full border p-3 mb-6 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none">
        
        <button onclick="uploadWatch()" id="btn" class="w-full bg-yellow-600 text-white p-4 rounded-lg font-bold text-lg hover:bg-yellow-700 transition">Post to My Store</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Aapka Project ID
        const firebaseConfig = { projectId: "watchstore-f0d57" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadWatch = async () => {
            const btn = document.getElementById('btn');
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const url = document.getElementById('url').value;

            if(!name || !price || !url) {
                alert("Please fill all fields!");
                return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "watches"), {
                    name: name,
                    price: price,
                    url: url,
                    status: 'available',
                    createdAt: Date.now()
                });
                alert("Watch Added Successfully!");
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Post to My Store";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
