<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TUE Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-xl mx-auto space-y-6">
        <div class="bg-black text-white p-6 rounded-3xl shadow-lg">
            <h2 class="text-lg font-bold mb-3">📢 Update Website News</h2>
            <input id="alertMsg" type="text" placeholder="Eid Sale or New Arrival Message" class="w-full p-3 bg-zinc-800 rounded-lg mb-3">
            <button onclick="updateAlert()" class="w-full bg-yellow-600 p-3 rounded-lg font-bold">Update News</button>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-lg border">
            <h2 class="text-lg font-bold mb-4">⌚ Add Watch to Stock</h2>
            <input id="wName" type="text" placeholder="Watch Name" class="w-full p-3 mb-3 border rounded-lg">
            <div class="flex gap-3 mb-3">
                <input id="wPrice" type="number" placeholder="Price" class="w-1/2 p-3 border rounded-lg">
                <input id="wStock" type="number" placeholder="Stock Qty" class="w-1/2 p-3 border rounded-lg">
            </div>
            <input id="wUrl" type="text" placeholder="Image Link (from Postimages)" class="w-full p-3 mb-4 border rounded-lg">
            <button onclick="addWatch()" id="btn" class="w-full bg-black text-white p-4 rounded-lg font-bold">ADD TO WEBSITE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdmv6OXxJt3VM-xybMMc0LrgFmv4AfjYg",
            authDomain: "tuewatchstore.firebaseapp.com",
            projectId: "tuewatchstore",
            appId: "1:982689793085:web:eb92ea1952692b083a5654"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.updateAlert = async () => {
            const msg = document.getElementById('alertMsg').value;
            await setDoc(doc(db, "settings", "announcement"), { text: msg });
            alert("News Updated!");
        };

        window.addWatch = async () => {
            const name = document.getElementById('wName').value;
            const price = document.getElementById('wPrice').value;
            const stock = document.getElementById('wStock').value;
            const url = document.getElementById('wUrl').value;
            
            await addDoc(collection(db, "watches"), {
                name, price, stock: Number(stock), url, sales: 0
            });
            alert("Watch Added Successfully!");
            location.reload();
        };
    </script>
</body>
</html>
