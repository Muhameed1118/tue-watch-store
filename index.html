<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUE WATCHES | Premium Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .announcement-bar { 
            background: linear-gradient(90deg, #d4af37, #f2d06b, #d4af37); 
            color: #000; 
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }
        .watch-card {
            background: linear-gradient(145deg, #0a0a0a, #111);
            transition: all 0.4s ease;
        }
        .watch-card:hover { transform: translateY(-10px); border-color: #d4af37; }
    </style>
</head>
<body>

    <div id="announcement-section" class="announcement-bar text-center p-3 font-black text-xs hidden uppercase tracking-[0.3em] sticky top-0 z-50 shadow-2xl">
        </div>

    <header class="py-16 px-6 text-center border-b border-zinc-900">
        <h1 class="text-6xl font-black tracking-tighter gold-text uppercase italic">TUE Watches</h1>
        <p class="text-zinc-500 text-[10px] tracking-[0.8em] mt-4 uppercase font-light">The Ultimate Experience in Time</p>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="watch-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse text-zinc-800 text-center col-span-full py-20">
                <p class="tracking-widest uppercase">Fetching Premium Stock...</p>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center border-t border-zinc-900 text-zinc-600">
        <p class="text-[10px] tracking-widest uppercase">&copy; 2026 TUE Watches - Baldia 4 Market</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Aapki Nayi Project Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBdmv6OXxJt3VM-xybMMc0LrgFmv4AfjYg",
            authDomain: "tuewatchstore.firebaseapp.com",
            projectId: "tuewatchstore",
            appId: "1:982689793085:web:eb92ea1952692b083a5654"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Logic 1: Announcement Load Karna ---
        onSnapshot(doc(db, "settings", "announcement"), (doc) => {
            const bar = document.getElementById('announcement-section');
            if (doc.exists() && doc.data().text) {
                bar.innerText = doc.data().text;
                bar.classList.remove('hidden');
            } else {
                bar.classList.add('hidden');
            }
        });

        // --- Logic 2: Watches & Stock Load Karna ---
        onSnapshot(collection(db, "watches"), (snapshot) => {
            const list = document.getElementById('watch-list');
            list.innerHTML = ""; // Purana data saaf karein

            if (snapshot.empty) {
                list.innerHTML = "<p class='col-span-full text-center text-zinc-500'>No watches found in inventory.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const w = doc.data();
                
                // Stock Calculation: Total Stock - Sold
                const currentStock = (w.stock || 0) - (w.sales || 0);
                const isOutOfStock = currentStock <= 0;
                
                list.innerHTML += `
                    <div class="watch-card p-4 rounded-[2.5rem] border border-zinc-900 group">
                        <div class="relative overflow-hidden rounded-[2rem] mb-6 shadow-2xl">
                            <img src="${w.url}" class="w-full h-80 object-cover transition-transform duration-700 group-hover:scale-110" 
                                 onerror="this.src='https://via.placeholder.com/400x500?text=TUE+Watches'">
                            ${isOutOfStock ? '<div class="absolute inset-0 bg-black/70 flex items-center justify-center font-black uppercase tracking-tighter text-3xl">Sold Out</div>' : ''}
                        </div>
                        
                        <div class="px-2">
                            <h3 class="text-xl font-bold mb-1 tracking-tight">${w.name}</h3>
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <p class="gold-text font-black text-2xl">Rs. ${Number(w.price).toLocaleString()}</p>
                                    <p class="text-[9px] uppercase tracking-widest ${isOutOfStock ? 'text-red-500' : 'text-green-500'} font-bold mt-1">
                                        ${isOutOfStock ? 'Out of Stock' : `Available Stock: ${currentStock}`}
                                    </p>
                                </div>
                            </div>

                            <button onclick="window.location.href='https://wa.me/923232124734?text=Salam, I want to order ${w.name}'" 
        class="w-full ${isOutOfStock ? 'bg-zinc-800 cursor-not-allowed' : 'bg-white hover:bg-[#d4af37]'} text-black py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all"
        ${isOutOfStock ? 'disabled' : ''}>
    ${isOutOfStock ? 'Wait for Restock' : 'Order via WhatsApp'}
</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
