<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUE WATCHES | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; }
        .gold-text { color: #aa771c; }
        .btn-gold { background: linear-gradient(135deg, #bf953f, #aa771c); color: #000; }
        .watch-card { border: 1px solid #1a1a1a; transition: 0.3s; }
        .watch-card:hover { border-color: #aa771c; box-shadow: 0 0 20px rgba(170,119,28,0.2); }
    </style>
</head>
<body>
    <header class="p-10 border-b border-zinc-800 text-center bg-black">
        <h1 style="font-family: 'Playfair Display';" class="text-5xl font-bold tracking-[0.2em] gold-text">TUE WATCHES</h1>
        <p class="text-zinc-500 mt-3 tracking-[0.4em] text-xs uppercase">Since 2026</p>
    </header>

    <div class="container mx-auto p-6 min-h-screen">
        <div id="watch-container" class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-10">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "watchstore-f0d57.firebaseapp.com",
            projectId: "watchstore-f0d57",
            storageBucket: "watchstore-f0d57.appspot.com",
            messagingSenderId: "3491239",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "watches"), (snapshot) => {
            const container = document.getElementById('watch-container');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const watch = doc.data();
                container.innerHTML += `
                    <div class="bg-zinc-900 p-6 rounded-[2rem] watch-card">
                        <img src="${watch.url}" class="w-full h-80 object-cover rounded-2xl mb-6">
                        <h3 class="text-2xl font-bold mb-1">${watch.name}</h3>
                        <p class="gold-text font-bold text-xl mb-6">${Number(watch.price).toLocaleString()} PKR</p>
                        <div class="bg-black/50 p-4 rounded-xl border border-zinc-800">
                            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">JazzCash Payment</p>
                            <p class="text-sm font-medium">Account Title: Euhammad Essa</p>
                        </div>
                        <button class="w-full mt-5 btn-gold py-4 rounded-xl font-black uppercase tracking-tighter">Order on WhatsApp</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
